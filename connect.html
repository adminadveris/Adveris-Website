<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect | Adveris Advisors LLP</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="icon" type="image/png" href="adveris_favicon_1776505504440.png" />
  <style>
    :root {
      --bg: #0D1B3E;
    }

    body {
      background: var(--bg);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      margin: 0;
    }

    .connect-container {
      width: 100%;
      max-width: 440px;
      text-align: center;
      animation: fadeIn 1s var(--ease-out);
    }

    .connect-header {
      margin-bottom: 40px;
    }

    .connect-avatar {
      width: 90px;
      height: 90px;
      background: white;
      color: var(--navy);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      box-shadow: 0 0 30px rgba(255, 153, 51, 0.2);
    }

    .connect-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      color: white;
      margin-bottom: 8px;
    }

    .connect-tagline {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    .connect-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .connect-link {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-sm);
      color: white;
      font-weight: 500;
      transition: all 0.3s var(--ease);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .connect-link:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--saffron);
      transform: translateY(-2px);
    }

    .connect-link span {
      position: relative;
      z-index: 2;
    }

    .link-primary {
      background: var(--saffron);
      color: var(--navy);
      border: none;
      font-weight: 600;
    }

    .link-primary:hover {
      background: var(--saffron-hover);
      color: white;
    }

    .icon {
      margin-right: 12px;
      width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .connect-footer {
      margin-top: auto;
      padding-top: 60px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
