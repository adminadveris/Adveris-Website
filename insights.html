  <main class="page-z">

    <div class="card-wrap" style="border-radius:var(--radius) var(--radius) 0 0;">

        <div class="container">
          <div style="display:flex;gap:8px;flex-wrap:wrap;padding-bottom:0;">
            <button class="btn"
              style="padding:8px 20px;font-size:0.7rem;background:var(--navy);color:white;border-radius:var(--radius-pill);"
              onclick="filterInsights('all',this)">All</button>
            <button class="btn"
              style="padding:8px 20px;font-size:0.7rem;background:var(--off-white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-pill);"
              onclick="filterInsights('corporate',this)">Corporate</button>
            <button class="btn"
              style="padding:8px 20px;font-size:0.7rem;background:var(--off-white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-pill);"
              onclick="filterInsights('compliance',this)">Compliance</button>
            <button class="btn"
              style="padding:8px 20px;font-size:0.7rem;background:var(--off-white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-pill);"
              onclick="filterInsights('tax',this)">Tax</button>
            <button class="btn"
              style="padding:8px 20px;font-size:0.7rem;background:var(--off-white);color:var(--navy);border:1px solid var(--border);border-radius:var(--radius-pill);"
              onclick="filterInsights('startup',this)">Startup</button>
          </div>
        </div>
      </div>

      <section class="section">
        <div class="container">
          <div class="insights-grid stagger" id="insightsGrid"></div>
        </div>
      </section>
    </div>

            <p class="sec-label" style="justify-content:center;">Stay Updated</p>
            <h2 class="sec-title">Get Compliance Alerts <em>in Your Inbox</em></h2>
            <p class="sec-body" style="margin:0 auto 32px;">Subscribe to our newsletter for regulatory updates,

                onfocus="this.style.borderColor='var(--saffron)'" onblur="this.style.borderColor='var(--border)'" />

    <div class="card-wrap">
      <div class="cta-band">
        <h2>Need Advice on a <em style="color:var(--saffron);">Specific Matter?</em></h2>
        <p>Our team is ready to answer your compliance and legal questions. Book a free consultation today.</p>
        <a href="contact.html" class="btn btn-primary">Talk to an Expert</a>
      </div>
    </div>
  </main>

  <footer data-section="footer" data-theme="dark"></footer>

  <script src="js/layout.js?v=1.1" defer></script>
  <script src="js/content-loader.js?v=1.1" defer></script>
  <script src="js/consent.js?v=1.1" defer></script>
  <script src="js/lenis.min.js?v=1.1" defer></script>
  <script>
    function filterInsights(cat, btn) {
      // Update active button styling
      document.querySelectorAll('[onclick^="filterInsights"]').forEach(b => {
        b.style.background = 'var(--off-white)';
        b.style.color = 'var(--navy)';
        b.style.border = '1px solid var(--border)';
      });
      btn.style.background = 'var(--navy)';
      btn.style.color = 'white';
      btn.style.border = 'none';

      // Show/hide cards
      const cards = document.querySelectorAll('#insightsGrid .insight-card');
      cards.forEach(card => {
        if (cat === 'all' || card.dataset.cat === cat) {
          card.removeAttribute('hidden');
        } else {
          card.setAttribute('hidden', '');
        }
      });
    }
  </script>
  <script src="js/main.js?v=1.1" defer></script>
